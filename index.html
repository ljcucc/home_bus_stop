<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>大台南公車立牌</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans TC', 'Segoe UI', sans-serif;
  background: #0a0a1a;
  color: #fff;
  min-height: 100vh;
}
.container { max-width: 860px; margin: 0 auto; padding: 16px; }

/* Header */
.header {
  text-align: center;
  padding: 16px 0 14px;
  border-bottom: 3px solid #e94560;
  margin-bottom: 20px;
}
.header h1 {
  font-size: 30px;
  font-weight: 900;
  color: #e94560;
  letter-spacing: 3px;
}
.header .time-display {
  font-size: 15px;
  color: #777;
  margin-top: 4px;
  letter-spacing: 1px;
}

/* Top bar */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
  gap: 8px;
  flex-wrap: wrap;
}
.top-bar .title-section {
  display: flex;
  align-items: center;
  gap: 8px;
}
.top-bar h2 {
  font-size: 15px;
  font-weight: 700;
  color: #aaa;
}
.top-bar .controls { display: flex; gap: 6px; flex-wrap: wrap; }
.top-bar .controls button {
  padding: 6px 12px;
  border: 1px solid #444;
  border-radius: 8px;
  background: #111;
  color: #ccc;
  font-size: 12px;
  cursor: pointer;
  transition: all .15s;
  font-family: inherit;
}
.top-bar .controls button:hover { background: #222; border-color: #666; }
.top-bar .controls button.active { border-color: #e94560; color: #e94560; }

/* Search area */
.search-area {
  margin-bottom: 20px;
  position: relative;
}
.search-row {
  display: flex;
  gap: 8px;
}
.search-row input {
  flex: 1;
  padding: 14px 18px;
  border: 2px solid #333;
  border-radius: 12px;
  background: #111;
  color: #fff;
  font-size: 16px;
  outline: none;
  transition: border-color .2s;
}
.search-row input:focus { border-color: #e94560; }
.search-row input::placeholder { color: #555; }
.search-row button {
  padding: 14px 20px;
  background: #e94560;
  border: none;
  border-radius: 12px;
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: background .2s;
  white-space: nowrap;
  font-family: inherit;
}
.search-row button:hover { background: #d63851; }

.suggestions {
  list-style: none;
  margin-top: 6px;
  border-radius: 12px;
  overflow: hidden;
  background: #111;
  border: 1px solid #333;
  display: none;
  position: absolute;
  width: 100%;
  z-index: 100;
}
.suggestions.active { display: block; }
.suggestions li {
  padding: 12px 16px;
  cursor: pointer;
  border-bottom: 1px solid #222;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: background .15s;
}
.suggestions li:hover { background: #1a1a3e; }
.suggestions li:last-child { border-bottom: none; }
.suggestions .stop-name { font-weight: 700; font-size: 15px; }
.suggestions .stop-dist { font-size: 12px; color: #888; }

/* Geo indicator */
.geo-indicator {
  display: none;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: #4caf50;
  margin-top: 8px;
}
.geo-indicator.active { display: flex; }
.geo-dot {
  width: 7px; height: 7px;
  background: #4caf50;
  border-radius: 50%;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Stops grid */
.stops-grid { display: flex; flex-direction: column; gap: 18px; }

/* Stop Card - sign style */
.stop-card {
  background: linear-gradient(160deg, #111122 0%, #0a0a2e 100%);
  border-radius: 14px;
  padding: 18px 20px;
  border: 1px solid #222244;
  box-shadow: 0 0 30px rgba(233,69,96,.06);
}
.stop-card .stop-title {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(255,255,255,.06);
}
.stop-card .stop-name {
  font-size: 22px;
  font-weight: 900;
  color: #fff;
  letter-spacing: 1px;
}
.stop-card .stop-id {
  font-size: 11px;
  color: #666;
  background: rgba(255,255,255,.06);
  padding: 2px 10px;
  border-radius: 20px;
}
.stop-card .remove-stop {
  background: none;
  border: none;
  color: #e94560;
  font-size: 18px;
  cursor: pointer;
  padding: 0 6px;
  line-height: 1;
  opacity: .6;
  transition: opacity .2s;
}
.stop-card .remove-stop:hover { opacity: 1; }

/* Side sub-cards - split by LocationID */
.stop-sides { display: flex; flex-direction: column; gap: 4px; }
.stop-side {
  background: rgba(255,255,255,.03);
  border-radius: 10px;
  padding: 8px 14px 6px;
  margin: 0 -4px;
}
.stop-side-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 2px;
  padding-bottom: 4px;
  border-bottom: 1px dashed rgba(255,255,255,.06);
}
.stop-side-id {
  font-size: 13px;
  font-weight: 700;
  color: #999;
  letter-spacing: .5px;
}
.stop-side-dir {
  font-size: 11px;
  color: #666;
  background: rgba(255,255,255,.05);
  padding: 1px 8px;
  border-radius: 10px;
}
.stop-side .route-row { padding: 7px 0; }
.stop-side .route-row:last-child { border-bottom: none; }

body.fullscreen .stop-side-id { font-size: 15px; }
body.fullscreen .stop-side { padding: 10px 16px 8px; }

/* Route row - sign style */
.route-row {
  display: flex;
  align-items: center;
  padding: 9px 0;
  border-bottom: 1px solid rgba(255,255,255,.04);
}
.route-row:last-child { border-bottom: none; }
.route-name {
  font-weight: 900;
  font-size: 18px;
  min-width: 120px;
  color: #f0c040;
  letter-spacing: .5px;
}
.route-dest {
  flex: 1;
  font-size: 14px;
  color: #999;
  padding: 0 14px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.route-time {
  font-weight: 700;
  font-size: 22px;
  min-width: 80px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.route-time.arriving { color: #4caf50; }
.route-time.approaching { color: #ff9800; }
.route-time.coming { color: #64b5f6; }
.route-time.nobus { color: #444; font-size: 13px; font-weight: 400; }

/* Hide no-bus toggle */
body.hide-nobus .route-time.nobus,
body.hide-nobus .route-row:has(.route-time.nobus) { display: none; }
body.hide-nobus .route-row:has(+ .route-row:not(:has(.route-time.nobus))) { border-bottom: 1px solid rgba(255,255,255,.04); }

/* Loading / Empty / Error */
.loading {
  text-align: center;
  padding: 50px 0;
  color: #555;
}
.spinner {
  width: 36px; height: 36px;
  border: 3px solid #222;
  border-top-color: #e94560;
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin: 0 auto 10px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.empty-state {
  text-align: center;
  padding: 50px 0;
  color: #444;
}
.empty-state .icon { font-size: 52px; margin-bottom: 14px; }
.empty-state p { font-size: 14px; line-height: 1.7; color: #555; }

.error-msg {
  background: rgba(233,69,96,.12);
  border: 1px solid #e94560;
  border-radius: 10px;
  padding: 10px 14px;
  color: #e94560;
  font-size: 13px;
  margin-bottom: 14px;
  display: none;
}
.error-msg.active { display: block; }

/* Last update bar */
.last-update {
  text-align: center;
  padding: 10px 0 20px;
  font-size: 12px;
  color: #333;
}
.last-update span { color: #555; }

/* Full screen */
body.fullscreen .container { max-width: 1200px; }
body.fullscreen .search-area,
body.fullscreen #geoIndicator,
body.fullscreen .top-bar .controls button:not(.fs-btn) { display: none; }
body.fullscreen .top-bar .controls button.fs-btn { border-color: #e94560; color: #e94560; }
body.fullscreen .header { padding: 10px 0 10px; margin-bottom: 14px; }
body.fullscreen .header h1 { font-size: 26px; }
body.fullscreen .header .time-display { font-size: 18px; color: #999; }
body.fullscreen .stop-card .stop-name { font-size: 28px; }
body.fullscreen .route-name { font-size: 22px; min-width: 140px; }
body.fullscreen .route-dest { font-size: 17px; }
body.fullscreen .route-time { font-size: 28px; min-width: 100px; }
body.fullscreen .stops-grid { gap: 22px; }
body.fullscreen .stop-card { padding: 24px 28px; }
body.fullscreen .route-row { padding: 12px 0; }

/* Responsive */
@media (max-width: 500px) {
  .container { padding: 10px; }
  .header h1 { font-size: 22px; }
  .stop-card .stop-name { font-size: 18px; }
  .route-name { min-width: 85px; font-size: 15px; }
  .route-time { font-size: 17px; min-width: 60px; }
  body.fullscreen .route-name { font-size: 18px; min-width: 100px; }
  body.fullscreen .route-time { font-size: 22px; min-width: 75px; }
  body.fullscreen .stop-card .stop-name { font-size: 22px; }
}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>🚏 大台南公車立牌</h1>
    <div class="time-display" id="timeDisplay"></div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="search-area">
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="搜尋站牌名稱…" autocomplete="off">
      <button id="searchBtn">🔍 搜尋</button>
      <button id="geoBtn" style="background:#0f3460;border-color:#444;">📍 定位</button>
    </div>
    <ul class="suggestions" id="suggestions"></ul>
    <div class="geo-indicator" id="geoIndicator">
      <span class="geo-dot"></span>
      <span id="geoText">已定位</span>
    </div>
  </div>

  <div class="top-bar">
    <div class="title-section">
      <h2>📋 我的站牌</h2>
    </div>
    <div class="controls">
      <button id="toggleNobus" class="active">隱藏未發車</button>
      <button id="refreshBtn">⟳ 重新整理</button>
      <button id="fullscreenBtn" class="fs-btn">⛶ 全螢幕</button>
    </div>
  </div>

  <div class="stops-grid" id="stopsGrid"></div>

  <div class="last-update">
    <span id="lastUpdateLabel">等待更新…</span>
  </div>

</div>

<script>
const API_BASE = 'https://2384.tainan.gov.tw/NewTNBusAPI_V2';
const KEYWORD_URL = API_BASE + '/API/keyword.ashx';
const CROSSROUTES_URL = API_BASE + '/API/CrossRoutesV2.ashx';

let myStops = JSON.parse(localStorage.getItem('tnBusStops') || '[]');
let refreshTimer = null;
let geoWatchId = null;
let hideNobus = localStorage.getItem('tnBusHideNobus') !== 'false';
let isFullscreen = false;

// --- Clock ---
function updateClock() {
  const now = new Date();
  document.getElementById('timeDisplay').textContent =
    now.toLocaleDateString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit', weekday:'short' }) +
    '  ' + now.toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

// --- Geolocation ---
function startGeolocation() {
  if (!navigator.geolocation) return;
  const btn = document.getElementById('geoBtn');
  btn.textContent = '📍 定位中…';
  btn.style.opacity = '.6';

  geoWatchId = navigator.geolocation.watchPosition(
    pos => {
      const { latitude, longitude } = pos.coords;
      localStorage.setItem('tnBusLat', latitude);
      localStorage.setItem('tnBusLon', longitude);
      btn.textContent = '📍 已定位';
      btn.style.opacity = '1';
      document.getElementById('geoIndicator').classList.add('active');
      document.getElementById('geoText').textContent =
        `已定位 (${latitude.toFixed(4)}, ${longitude.toFixed(4)})`;
    },
    () => {
      btn.textContent = '📍 定位';
      btn.style.opacity = '1';
      document.getElementById('geoIndicator').classList.remove('active');
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}
document.getElementById('geoBtn').addEventListener('click', startGeolocation);

if (localStorage.getItem('tnBusLat')) {
  const lat = parseFloat(localStorage.getItem('tnBusLat'));
  const lon = parseFloat(localStorage.getItem('tnBusLon'));
  document.getElementById('geoIndicator').classList.add('active');
  document.getElementById('geoText').textContent = `已定位 (${lat.toFixed(4)}, ${lon.toFixed(4)})`;
  document.getElementById('geoBtn').textContent = '📍 已定位';
}

// --- Distance ---
function calcDistance(lat1, lon1, lat2, lon2) {
  const R = 6371e3;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

// --- Autocomplete ---
const searchInput = document.getElementById('searchInput');
const suggestions = document.getElementById('suggestions');
let searchTimeout;

searchInput.addEventListener('input', () => {
  clearTimeout(searchTimeout);
  const q = searchInput.value.trim();
  if (q.length < 1) { suggestions.classList.remove('active'); return; }
  searchTimeout = setTimeout(() => searchStops(q), 250);
});

document.getElementById('searchBtn').addEventListener('click', () => {
  const q = searchInput.value.trim();
  if (q) searchStops(q);
});

async function searchStops(keyword) {
  try {
    const res = await fetch(KEYWORD_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({ keyword, type: '1', Lang: 'cht', prj: 'tn' })
    });
    const data = await res.json();
    renderSuggestions(data);
  } catch (e) {
    console.error('Search error:', e);
  }
}

function renderSuggestions(stops) {
  suggestions.innerHTML = '';
  if (!stops || stops.length === 0) { suggestions.classList.remove('active'); return; }
  const myLat = parseFloat(localStorage.getItem('tnBusLat') || 'NaN');
  const myLon = parseFloat(localStorage.getItem('tnBusLon') || 'NaN');
  const hasLocation = !isNaN(myLat);
  stops.forEach(s => {
    const dist = hasLocation ? calcDistance(myLat, myLon, parseFloat(s.lat), parseFloat(s.lon)) : -1;
    const li = document.createElement('li');
    li.innerHTML = `<span class="stop-name">${s.name}</span>` +
      (dist > 0 ? `<span class="stop-dist">${dist < 1000 ? Math.round(dist)+'m' : (dist/1000).toFixed(1)+'km'}</span>` : '');
    li.addEventListener('click', () => {
      addStop(s.name);
      searchInput.value = '';
      suggestions.classList.remove('active');
    });
    suggestions.appendChild(li);
  });
  suggestions.classList.add('active');
}
document.addEventListener('click', e => {
  if (!e.target.closest('.search-area')) suggestions.classList.remove('active');
});

// --- Stops management ---
function addStop(name) {
  if (myStops.includes(name)) { showError('「'+name+'」已在清單中'); return; }
  myStops.push(name);
  saveStops();
}
function removeStop(name) {
  myStops = myStops.filter(s => s !== name);
  saveStops();
}
function saveStops() {
  localStorage.setItem('tnBusStops', JSON.stringify(myStops));
  renderStops();
  scheduleRefresh();
}

// --- Render ---
async function renderStops() {
  const grid = document.getElementById('stopsGrid');
  document.getElementById('lastUpdateLabel').textContent = '更新中…';

  if (myStops.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="icon">🚌</div><p>在上方搜尋站牌名稱加入<br>即會顯示即時到站資訊</p></div>';
    document.getElementById('lastUpdateLabel').textContent = '—';
    return;
  }

  grid.innerHTML = '<div class="loading"><div class="spinner"></div>載入中…</div>';

  const allHtml = [];
  for (const stopName of myStops) {
    try {
      const html = await fetchStopData(stopName);
      allHtml.push(html);
    } catch (e) {
      allHtml.push(renderStopError(stopName));
    }
  }
  grid.innerHTML = allHtml.join('');

  const now = new Date();
  document.getElementById('lastUpdateLabel').textContent =
    '最後更新：' + now.toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

async function fetchStopData(stopName) {
  const res = await fetch(CROSSROUTES_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ stopnamecht: stopName, Lang: 'cht', Types: '1', prj: 'tn' })
  });
  const data = await res.json();

  if (!data || data.length === 0) return renderStopError(stopName, '查無此站牌資料');

  const myLat = parseFloat(localStorage.getItem('tnBusLat') || 'NaN');
  const myLon = parseFloat(localStorage.getItem('tnBusLon') || 'NaN');
  const hasLocation = !isNaN(myLat);

  // Process each physical stop location separately
  const sides = [];
  for (const loc of data) {
    const locId = loc.LocationID;
    const routes = [];

    for (const info of loc.info) {
      const timeStr = info.Time;
      const timeNum = parseInt(timeStr);
      let timeLabel, timeClass;

      if (timeStr === '未發車' || timeStr === '已發車' || isNaN(timeNum)) {
        timeLabel = timeStr;
        timeClass = 'nobus';
      } else if (timeNum <= 1) {
        timeLabel = '即將進站';
        timeClass = 'arriving';
      } else if (timeNum <= 3) {
        timeLabel = timeNum + ' 分';
        timeClass = 'arriving';
      } else if (timeNum <= 10) {
        timeLabel = timeNum + ' 分';
        timeClass = 'approaching';
      } else {
        timeLabel = timeNum + ' 分';
        timeClass = 'coming';
      }

      const dir = info.GoBack === '0' ? '去程' : '返程';

      routes.push({
        routeName: info.RouteName,
        dest: info.GoBack === '0' ? info.Dest : info.Dept,
        timeLabel, timeClass, timeNum,
        goback: info.GoBack, routeId: info.RouteID, dir
      });
    }

    routes.sort((a, b) => {
      const order = { arriving:0, approaching:1, coming:2, nobus:3 };
      const ao = order[a.timeClass] ?? 99, bo = order[b.timeClass] ?? 99;
      if (ao !== bo) return ao - bo;
      if (!isNaN(a.timeNum) && !isNaN(b.timeNum)) return a.timeNum - b.timeNum;
      return a.routeName.localeCompare(b.routeName);
    });

    // Determine direction label from routes
    const gobacks = [...new Set(routes.map(r => r.goback))];
    const dirLabel = gobacks.length === 1 ? (gobacks[0] === '0' ? '往程' : '返程') : '雙向';

    let distText = '';
    if (hasLocation && loc.info.length > 0) {
      const r = loc.info[0];
      if (r.Lat && r.Lon) {
        const dist = calcDistance(myLat, myLon, parseFloat(r.Lat), parseFloat(r.Lon));
        distText = dist < 1000 ? Math.round(dist) + 'm' : (dist / 1000).toFixed(1) + 'km';
      }
    }

    sides.push({ locId, dirLabel, distText, routes, gobacks, hasLocation });
  }

  // Sort sides: multiple GoBack first (both directions at this stop), then by distance
  sides.sort((a, b) => {
    if (a.gobacks.length !== b.gobacks.length) return b.gobacks.length - a.gobacks.length;
    return a.locId.localeCompare(b.locId);
  });

  let sidesHtml = sides.map(side => {
    const routesHtml = side.routes.map(r => `
      <div class="route-row">
        <span class="route-name">${r.routeName}</span>
        <span class="route-dest" title="${r.dest}">往 ${r.dest}</span>
        <span class="route-time ${r.timeClass}">${r.timeLabel}</span>
      </div>
    `).join('');

    return `
      <div class="stop-side">
        <div class="stop-side-header">
          <span class="stop-side-id">📍 ${side.locId} ${side.distText ? '· ' + side.distText : ''}</span>
          <span class="stop-side-dir">${side.dirLabel}</span>
        </div>
        ${routesHtml || '<div class="route-row"><span style="color:#555;padding:4px 0;">無營運路線</span></div>'}
      </div>
    `;
  }).join('');

  return `
    <div class="stop-card">
      <div class="stop-title">
        <span class="stop-name">${esc(stopName)}</span>
        ${sides.length === 1 ? `<span class="stop-id">${sides[0].locId}</span>` : ''}
        <button class="remove-stop" onclick="removeStop('${esc(stopName)}')" title="移除">✕</button>
      </div>
      <div class="stop-sides">
        ${sidesHtml}
      </div>
    </div>
  `;
}

function renderStopError(name, msg) {
  return `<div class="stop-card"><div class="stop-title"><span class="stop-name">${esc(name)}</span><button class="remove-stop" onclick="removeStop('${esc(name)}')" title="移除">✕</button></div><div class="route-row"><span style="color:#e94560;">${msg||'資料讀取失敗'}</span></div></div>`;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('active');
  setTimeout(() => el.classList.remove('active'), 3000);
}

// --- Toggle no-bus ---
function applyHideNobus() {
  document.body.classList.toggle('hide-nobus', hideNobus);
  const btn = document.getElementById('toggleNobus');
  btn.classList.toggle('active', hideNobus);
}
document.getElementById('toggleNobus').addEventListener('click', () => {
  hideNobus = !hideNobus;
  localStorage.setItem('tnBusHideNobus', hideNobus);
  applyHideNobus();
});
applyHideNobus();

// --- Refresh ---
document.getElementById('refreshBtn').addEventListener('click', renderStops);

function scheduleRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  if (myStops.length === 0) return;
  refreshTimer = setInterval(renderStops, 30000);
}

// --- Fullscreen ---
document.getElementById('fullscreenBtn').addEventListener('click', () => {
  isFullscreen = !isFullscreen;
  document.body.classList.toggle('fullscreen', isFullscreen);
  document.getElementById('fullscreenBtn').textContent = isFullscreen ? '⛶ 離開全螢幕' : '⛶ 全螢幕';
});

// --- Init ---
renderStops();
scheduleRefresh();

window.addEventListener('beforeunload', () => {
  if (geoWatchId !== null) navigator.geolocation.clearWatch(geoWatchId);
});
</script>
</body>
</html>
